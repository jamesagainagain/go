services:
  api:
    build: ./backend
    ports:
      - "8001:8000"  # host:container (8001 avoids conflict with local uvicorn on 8000)
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - ./data:/data  # demo seeds (london_local_places.json, synthetic_users.json)
    environment:
      - DATABASE_URL=postgresql+asyncpg://firstmove:password@db:5432/firstmove
      - REDIS_URL=redis://redis:6379/0

  worker:
    build: ./backend
    command: celery -A app.tasks worker -l info
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://firstmove:password@db:5432/firstmove
      - REDIS_URL=redis://redis:6379/0

  beat:
    build: ./backend
    command: celery -A app.tasks beat -l info
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://firstmove:password@db:5432/firstmove
      - REDIS_URL=redis://redis:6379/0

  db:
    image: postgis/postgis:16-3.4
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=firstmove
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=firstmove

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
